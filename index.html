<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campanha Solar Intelbras</title>
    
    <style>
      
      body{
        font-family: Arial, sans-serif;
        background:#f4f6f9;
        margin:0;
        padding:30px;
      }
      
      .container{
        max-width:1200px;
        margin:auto;
      }
      
      .titulo{
        text-align:center;
        color:#2c3e50;
      }
      
      .card{
        background:white;
        border-radius:10px;
        padding:20px;
        margin:15px 0;
        box-shadow:0 2px 5px rgba(0,0,0,0.1);
      }
      
      .valor{
        font-size:32px;
        font-weight:bold;
        color:#27ae60;
      }
      
    </style>
  </head>
  
  <body>
    
  <div class="container">
    
    <h1 class="titulo">
      Campanha Solar Intelbras
    </h1>
    
    <div class="card">
      <h2>Meta Total</h2>
      <div class="valor">R$ 10.000.000</div>
    </div>
    
    <div class="card">
      <h2>Faturado</h2>
      <div class="valor">R$ 3.250.000</div>
    </div>
    
  <div class="card">
      <h2>Progresso</h2>
    <div class="valor">65%</div>
  </div>

</div>
  
</body>
</html>
