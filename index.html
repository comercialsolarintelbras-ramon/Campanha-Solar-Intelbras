<!DOCTYPE html>
<html lang="pt-br">
  
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Campeonato Solar Intelbras</title>
  
  /0.18.5/xlsx.full.min.js"></script>
  
  <style>
body{
  font-family:Arial;
  background:#f4f6f9;
  margin:0;
  padding:30px;
}
   
.container{
  max-width:1000px;
  margin:auto;
}
    
h1{
  text-align:center;
  color:#0f4c81;
}
    
.upload{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}
  
.time{
  background:white;
  margin-bottom:10px;
  padding:20px;
  border-radius:10px;
  box-shadow:0px 2px 5px rgba(0,0,0,0.1);
}

.nome{
  font-size:24px;
  font-weight:bold;
}

.pontos{
  font-size:36px;
  color:#27ae60;
}
 
</style>

</head>

<body>

<div class="container">

  <h1>🏆 Campeonato Solar Intelbras</h1>

<div class="upload">
  
  <h3>Selecionar Planilha</h3>
  
  <input type="file" id="excelFile">
  
</div>
  
<div id="ranking">
  
</div>

</div>

<script>
  
document
.getElementById("excelFile")
.addEventListener("change", carregarExcel);

function carregarExcel(event){
  
const arquivo = event.target.files[0];

const reader = new FileReader();
  
reader.onload = function(e){
  
const dados = new Uint8Array(e.target.result);
  
const workbook =
XLSX.read(dados,{type:'array'});

const worksheet =
workbook.Sheets["SITE"];
  
const json =
XLSX.utils.sheet_to_json(worksheet);
  
mostrarRanking(json);

}
  
reader.readAsArrayBuffer(arquivo);

}
  
function mostrarRanking(dados){
  
let html = "";

  dados.sort((a,b)=>b.Pontos-a.Pontos);
  
dados.forEach((time,index)=>{
  
let medalha = "";
  
if(index===0) medalha="🥇";
if(index===1) medalha="🥈";
if(index===2) medalha="🥉";
  
html += `

<div class="time">

<div class="nome">

${medalha} ${time.Time}

</div>

<div class="pontos">

${time.Pontos} Pontos

</div>

</div>

`;

});
  
  document.getElementById("ranking").innerHTML = html;

}

</script>

</body>

</html>
